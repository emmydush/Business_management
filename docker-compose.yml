version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: business_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Jesuslove@12
      POSTGRES_DB: all_inone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d all_inone"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: business_backend
    environment:
      - DATABASE_URL=postgresql://postgres:Jesuslove@12@db:5432/all_inone
      - DB_USER=postgres
      - DB_PASSWORD=Jesuslove@12
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=all_inone
      - FLASK_ENV=development
      - PORT=5000
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000
      - JWT_SECRET_KEY=docker-jwt-secret-key
      - SECRET_KEY=docker-secret-key
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: business_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
