# Docker Compose Production Configuration
# Use this for production deployments with enhanced security and performance

version: '3.8'

services:
  # PostgreSQL Database - Production Configuration
  db:
    image: postgres:15-alpine
    container_name: business_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_MAX_CONNECTIONS: "100"
      POSTGRES_SHARED_BUFFERS: "256MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - business_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API Server - Production Configuration
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: business_backend_prod
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USE_TLS: true
      MAIL_USE_SSL: false
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER}
      CORS_ORIGINS: ${CORS_ORIGINS}
      FLASK_DEBUG: 0
      PORT: 5000
      WEB_CONCURRENCY: 4
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
    volumes:
      - backend_static_uploads:/app/static/uploads
      - backend_instance:/app/instance
    depends_on:
      db:
        condition: service_healthy
    networks:
      - business_network
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Frontend Web Server - Production Configuration
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-/api}
    container_name: business_frontend_prod
    restart: always
    ports:
      - "80:3000"
      - "443:443"
    depends_on:
      - backend
    networks:
      - business_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Volumes
volumes:
  postgres_data:
    driver: local
  backend_static_uploads:
    driver: local
  backend_instance:
    driver: local

# Networks
networks:
  business_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
