name: Automated Dependency Updates

on:
  schedule:
    # Run weekly on Sundays at 3 AM UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Type of update'
        required: true
        default: 'minor'
        type: choice
        options:
          - minor
          - patch
          - major

jobs:
  update-python:
    name: Update Python Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install update tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-review pur
    
    - name: Check for outdated packages
      id: check-outdated
      run: |
        pip-review --local --outdated > outdated-packages.txt || true
        cat outdated-packages.txt
    
    - name: Update dependencies
      id: update-deps
      run: |
        if [ "${{ github.event.inputs.update_type }}" = "major" ]; then
          pip-review --local --auto
        else
          # Update only minor and patch versions
          pip-review --local --auto --interactive
        fi
      working-directory: ./backend
      continue-on-error: true
    
    - name: Generate updated requirements.txt
      run: |
        pip freeze > requirements-new.txt
        
        # Remove development packages
        grep -v "^(pip\|setuptools\|wheel\|pur\|pip-review)" requirements-new.txt > requirements.txt
        
        rm requirements-new.txt
      working-directory: ./backend
    
    - name: Run tests
      id: run-tests
      run: |
        pip install pytest pytest-flask
        pip install -r requirements.txt
        # Run your test suite
        pytest --tb=short || echo "Tests completed with some failures"
      continue-on-error: true
      working-directory: ./backend
    
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore(deps): update Python dependencies'
        title: '📦 Automated Python Dependency Updates'
        body: |
          ## Automated Dependency Update
          
          This PR was automatically generated by the dependency update workflow.
          
          ### Changes
          - Updated Python packages to latest versions
          - Security patches applied where available
          
          ### Checklist
          - [ ] Review updated packages
          - [ ] Verify all tests pass
          [ ] Deploy to staging environment
          - [ ] Monitor for any issues
          
          ### Updated Packages
          ```
          ${{ steps.check-outdated.outputs.packages }}
          ```
        branch: automated/python-deps-update
        delete-branch: true
        labels: dependencies, python, automated

  update-npm:
    name: Update NPM Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
      working-directory: ./frontend
    
    - name: Check for outdated packages
      id: check-outdated
      run: |
        npm outdated --json > outdated-packages.json || true
        cat outdated-packages.json | jq -r 'keys[]' > outdated-list.txt || true
    
    - name: Update dependencies
      id: update-deps
      run: |
        if [ "${{ github.event.inputs.update_type }}" = "major" ]; then
          npx npm-check-updates -u
        elif [ "${{ github.event.inputs.update_type }}" = "minor" ]; then
          npx npm-check-updates -u --target minor
        else
          npm update
        fi
        
        npm install
      working-directory: ./frontend
      continue-on-error: true
    
    - name: Run security audit
      id: security-audit
      run: |
        npm audit --audit-level=moderate > audit-report.txt || true
        cat audit-report.txt
      continue-on-error: true
      working-directory: ./frontend
    
    - name: Run tests
      id: run-tests
      run: |
        npm test -- --watchAll=false --passWithNoTests || echo "Tests completed"
      continue-on-error: true
      working-directory: ./frontend
    
    - name: Build project
      id: build-project
      run: |
        npm run build
      continue-on-error: true
      working-directory: ./frontend
    
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore(deps): update NPM dependencies'
        title: '📦 Automated NPM Dependency Updates'
        body: |
          ## Automated Dependency Update
          
          This PR was automatically generated by the dependency update workflow.
          
          ### Changes
          - Updated NPM packages to latest versions
          - Security patches applied where available
          
          ### Checklist
          - [ ] Review updated packages
          - [ ] Verify build succeeds
          - [ ] Verify all tests pass
          - [ ] Deploy to staging environment
          - [ ] Monitor for any issues
          
          ### Updated Packages
          See the `package.json` diff for full list of updates.
          
          ### Security Audit
          ```
          ${{ steps.security-audit.outputs.report }}
          ```
        branch: automated/npm-deps-update
        delete-branch: true
        labels: dependencies, npm, javascript, automated

  notify:
    name: Notify Team
    needs: [update-python, update-npm]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Send notification
      uses: slackapi/slack-github-action@v1.27.0
      with:
        payload: |
          {
            "text": "Dependency updates completed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "📦 *Dependency Update Workflow Completed*\n\n*Python Updates:* ${{ needs.update-python.result }}\n*NPM Updates:* ${{ needs.update-npm.result }}\n\nCheck the pull requests for details."
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      if: secrets.SLACK_WEBHOOK_URL
