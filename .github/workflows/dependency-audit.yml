name: Dependency Security Audit

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/requirements.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/requirements.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
  workflow_dispatch:

jobs:
  python-audit:
    name: Python Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety pip-audit
        pip install -r backend/requirements.txt
    
    - name: Run Safety Check
      id: safety
      run: |
        safety check --json --full-report || true
        safety check --full-report
      continue-on-error: true
      working-directory: ./backend
    
    - name: Run pip-audit
      id: pip-audit
      run: |
        pip-audit --format=json --desc --output=pip-audit-report.json || true
        pip-audit --desc -r requirements.txt
      continue-on-error: true
      working-directory: ./backend
    
    - name: Upload Python audit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: python-security-report
        path: |
          backend/pip-audit-report.json
          backend/safety-report.json
        retention-days: 30
    
    - name: Check for critical vulnerabilities
      run: |
        if [ -f "backend/pip-audit-report.json" ]; then
          critical_count=$(cat backend/pip-audit-report.json | jq '[.dependencies[].vulns[] | select(.fix_versions | length > 0)] | length')
          if [ "$critical_count" -gt 0 ]; then
            echo "::warning::Found $critical_count packages with known vulnerabilities that have available fixes"
          fi
        fi
      shell: bash

  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
      working-directory: ./frontend
    
    - name: Run npm audit
      id: npm-audit
      run: |
        npm audit --json --audit-level=moderate > npm-audit-report.json || true
        npm audit --audit-level=moderate
      continue-on-error: true
      working-directory: ./frontend
    
    - name: Upload NPM audit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: npm-security-report
        path: frontend/npm-audit-report.json
        retention-days: 30
    
    - name: Check for high severity vulnerabilities
      run: |
        if [ -f "frontend/npm-audit-report.json" ]; then
          high_count=$(cat frontend/npm-audit-report.json | jq '.metadata.vulnerabilities.high // 0')
          critical_count=$(cat frontend/npm-audit-report.json | jq '.metadata.vulnerabilities.critical // 0')
          
          if [ "$critical_count" -gt 0 ]; then
            echo "::error::Found $critical_count critical vulnerabilities! Immediate action required."
            exit 1
          fi
          
          if [ "$high_count" -gt 0 ]; then
            echo "::warning::Found $high_count high severity vulnerabilities"
          fi
        fi
      shell: bash
      working-directory: ./frontend

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Dependency Review
      uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: high
        deny-licenses: 'GPL-1.0-or-later, AGPL-1.0-or-later'
        comment-summary-in-pr: true

  generate-report:
    name: Generate Dependency Report
    needs: [python-audit, npm-audit]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Download Python audit report
      uses: actions/download-artifact@v4
      with:
        name: python-security-report
        path: reports/python
    
    - name: Download NPM audit report
      uses: actions/download-artifact@v4
      with:
        name: npm-security-report
        path: reports/npm
    
    - name: Generate summary report
      run: |
        echo "# Dependency Security Audit Report" > dependency-report.md
        echo "Generated: $(date -u)" >> dependency-report.md
        echo "" >> dependency-report.md
        
        echo "## Python Dependencies" >> dependency-report.md
        if [ -f "reports/python/pip-audit-report.json" ]; then
          echo "Python audit report available in artifacts" >> dependency-report.md
        else
          echo "No Python vulnerabilities found or audit not completed" >> dependency-report.md
        fi
        echo "" >> dependency-report.md
        
        echo "## NPM Dependencies" >> dependency-report.md
        if [ -f "reports/npm/npm-audit-report.json" ]; then
          echo "NPM audit report available in artifacts" >> dependency-report.md
        else
          echo "No NPM vulnerabilities found or audit not completed" >> dependency-report.md
        fi
        echo "" >> dependency-report.md
        
        cat dependency-report.md
    
    - name: Upload summary report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-security-summary
        path: dependency-report.md
        retention-days: 30
    
    - name: Create issue for vulnerabilities
      if: github.event_name == 'schedule' && failure()
      uses: actions/github-script@v7
      with:
        script: |
          const title = '🔒 Security: Dependency Vulnerabilities Detected';
          const body = `Security audit detected vulnerabilities in dependencies.
          
          **Action Required:**
          - Review the security audit reports in the workflow artifacts
          - Update vulnerable dependencies
          - Run ​\​`npm audit fix​\​` for frontend
          - Run ​\​`pip install --upgrade <package>​\​` for backend
          
          **Workflow:** ${context.workflow}
          **Run:** ${context.runId}`;
          
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: title,
            body: body,
            labels: ['security', 'dependencies', 'automated']
          });
